name: Deploy Cricket Cards

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Deployment note (optional)'
        required: false
        default: 'Manual deploy'
  push:
    branches:
      - main
    paths:
      - 'index.html'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print result
        run: |
          echo "Deployed to ${{ steps.deploy.outputs.page_url }}"
